name: Azure Static Web Apps CI/CD

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  build:
    runs-on: ubuntu-latest
    name: Build Angular App

    steps:
      - uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Install dependencies
        run: npm ci


      - name: Intentionally fail build for test
        run: |
          echo "This step will fail to test issue creation"
          exit 1

      - name: Build Angular app
        run: npx ng build

      # 🔍 DEBUG: inspect dist output
      - name: List dist folder structure
        run: |
          echo "=== dist root ==="
          ls -la dist || true

          echo "=== paint-app ==="
          ls -la dist/paint-app || true

          echo "=== browser ==="
          ls -la dist/paint-app/browser || true

      # 🔍 DEBUG: verify entry file
      - name: Verify index.html exists
        run: |
          if [ -f dist/paint-app/browser/index.html ]; then
            echo "✅ index.html found"
          else
            echo "❌ index.html NOT found"
            exit 1
          fi

      - name: Upload build artifact
        uses: actions/upload-artifact@v6
        with:
          name: app
          path: dist/paint-app/browser

  deploy:
    needs: build
    runs-on: ubuntu-latest
    name: Deploy to Azure Static Web Apps

    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v8
        with:
          name: app
          path: dist/paint-app/browser

      # 🔍 DEBUG: confirm artifact contents
      - name: List downloaded artifact
        run: |
          echo "=== downloaded artifact ==="
          ls -la dist/paint-app/browser

      - name: Debug token presence
        run: |
          if [ -z "$TOKEN" ]; then
            echo "TOKEN is empty"
            exit 1
          else
            echo "TOKEN exists (length: ${#TOKEN})"
          fi
        env:
          TOKEN: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_THANKFUL_MOSS_043AFF203 }}

      - name: Deploy to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_THANKFUL_MOSS_043AFF203 }}
          action: upload
          app_location: "dist/paint-app/browser"
          api_location: ""


  on-build-failure:
    needs: build
    if: failure()
    runs-on: ubuntu-latest
    name: Create Fix Issue on Build Failure
    permissions:
      issues: write
    steps:
      - name: Create GitHub issue and assign to Copilot
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          COMMIT_SHA: ${{ github.sha }}
          BRANCH: ${{ github.ref_name }}
        run: |

          gh issue create \
            --repo "$REPO" \
            --title "CI build failed on $BRANCH (${{ github.run_number }})" \
            --body "## Build Failure

          The CI build failed on branch \`$BRANCH\` at commit \`$COMMIT_SHA\`.

          **Run:** $RUN_URL

          Please investigate the build logs and fix the issue.

          ### Steps to reproduce
          1. Check the failed run linked above
          2. Review the build and test output
          3. Push a fix to \`$BRANCH\`" \
            --label "bug,agent:copilot"


  close_pull_request_job:
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    name: Close Pull Request Job
    steps:
      - name: Close Pull Request
        id: closepullrequest
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_THANKFUL_MOSS_043AFF203 }}
          action: "close"
          app_location: ""
