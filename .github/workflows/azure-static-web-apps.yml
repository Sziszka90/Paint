name: Azure Static Web Apps CI/CD

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    name: Build Angular App

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Build Angular app
        run: npx ng build

      # 🔍 DEBUG: inspect dist output
      - name: List dist folder structure
        run: |
          echo "=== dist root ==="
          ls -la dist || true

          echo "=== paint-app ==="
          ls -la dist/paint-app || true

          echo "=== browser ==="
          ls -la dist/paint-app/browser || true

      # 🔍 DEBUG: verify entry file
      - name: Verify index.html exists
        run: |
          if [ -f dist/paint-app/browser/index.html ]; then
            echo "✅ index.html found"
          else
            echo "❌ index.html NOT found"
            exit 1
          fi

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: app
          path: dist/paint-app/browser

  deploy:
    needs: build
    runs-on: ubuntu-latest
    name: Deploy to Azure Static Web Apps

    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: app
          path: dist/paint-app/browser

      # 🔍 DEBUG: confirm artifact contents
      - name: List downloaded artifact
        run: |
          echo "=== downloaded artifact ==="
          ls -la dist/paint-app/browser

      - name: Deploy to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_LIVELY_HILL_04B666F03 }}
          action: upload
          app_location: "dist/paint-app/browser"
          api_location: ""
